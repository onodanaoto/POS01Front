name: Deploy Frontend to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        cd SP14/frontend
        npm install
        
    - name: Build
      run: |
        cd SP14/frontend
        npm run build
      env:
        NEXT_PUBLIC_API_URL: 'https://tech0-gen8-step4-pos-app-78.azurewebsites.net'
        NODE_ENV: 'production'

    - name: Generate deployment package
      run: |
        cd SP14/frontend
        zip -r deploy.zip . -x "node_modules/*" "*.git*"
        
    - name: Deploy to Azure
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'tech0-gen8-step4-pos-app-77'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: SP14/frontend/deploy.zip
        startup-command: 'cd /home/site/wwwroot && npm install && npm run start' 